<!DOCTYPE html>
<html>

<head>
  <title>CSS Positioning Exercise</title>
  <style>
    /* Write your code here */
    div {
      height: 10000px;
    }
    
    .red-circle {
      background-color: red;
      width: 200px;
      height: 200px;
      border-radius: 100px;
      position: relative;
      top: 150px;
      left: 250px;
    }

    .blue-box {
      background-color: blue;
      height: 300px;
      width: 500px;
      position: absolute;
      top: 200px;
      left: 200px;
    }

    .yellow-box {
      background-color: yellow;
      height: 130px;
      width: 150px;
      position: fixed;
      top: 200px;
      left: 200px;
      z-index: 2;
    }
  </style>
</head>

<body>
  <div>
    <div class="yellow-box"></div>
    <div class="blue-box">
      <div class="red-circle">
      </div>
    </div>
  </div>

</body>

</html>
